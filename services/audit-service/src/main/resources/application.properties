spring.application.name=audit-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
server.port=8085
spring.datasource.url=jdbc:postgresql://postgres:5432/audit_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.locations=classpath:db/migration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=audit-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mtesazi.sharedlibrary.kafka
spring.kafka.consumer.properties.spring.json.value.default.type=com.mtesazi.sharedlibrary.kafka.EmployeeCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL:http://discovery-server:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
