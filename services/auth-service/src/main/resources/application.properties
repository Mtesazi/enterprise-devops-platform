spring.application.name=auth-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
server.port=8083
spring.datasource.url=jdbc:postgresql://postgres:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.locations=classpath:db/migration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL:http://discovery-server:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

security.jwt.secret=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
security.jwt.access-token-expiration=900000
security.jwt.refresh-token-expiration=604800000
