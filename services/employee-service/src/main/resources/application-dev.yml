spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/employee_db_dev
    username: postgres
    password: postgres

logging:
  level:
    com.mtesazi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: DEBUG

services:
  department:
    base-url: ${DEPARTMENT_SERVICE_BASE_URL:http://department-service}
    connect-timeout: 2s
    read-timeout: 3s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}
