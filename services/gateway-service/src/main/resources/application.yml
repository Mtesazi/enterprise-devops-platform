spring:
  application:
    name: gateway-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          httpclient:
            connect-timeout: 2000
            response-timeout: 3s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

services:
  auth:
    base-url: ${AUTH_SERVICE_BASE_URL:lb://auth-service}
  employee:
    base-url: ${EMPLOYEE_SERVICE_BASE_URL:lb://employee-service}
  department:
    base-url: ${DEPARTMENT_SERVICE_BASE_URL:lb://department-service}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://discovery-server:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

security:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:true}
    jwt-secret: ${GATEWAY_JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    public-paths:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /login
      - /register
      - /actuator/health
      - /swagger-ui/**
      - /swagger/**
      - /v3/api-docs/**
