spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 2000
            response-timeout: 3s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

services:
  employee:
    base-url: ${EMPLOYEE_SERVICE_BASE_URL:http://localhost:8081}
  department:
    base-url: ${DEPARTMENT_SERVICE_BASE_URL:http://localhost:8082}

security:
  auth:
    enabled: false
    public-paths:
      - /actuator/**
      - /swagger-ui/**
      - /v3/api-docs/**
