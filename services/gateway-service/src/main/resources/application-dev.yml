logging:
  level:
    com.mtesazi: DEBUG
    org.springframework.cloud.gateway: DEBUG

services:
  auth:
    base-url: ${AUTH_SERVICE_BASE_URL:lb://auth-service}
  employee:
    base-url: ${EMPLOYEE_SERVICE_BASE_URL:lb://employee-service}
  department:
    base-url: ${DEPARTMENT_SERVICE_BASE_URL:lb://department-service}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}

security:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:true}
    jwt-secret: ${GATEWAY_JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
